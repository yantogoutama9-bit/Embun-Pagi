<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renungan Harian & Quotes Rohani</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #eaeaea;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -100px;
        }

        .shape:nth-child(2) {
            width: 200px;
            height: 200px;
            bottom: -100px;
            left: -100px;
            animation-delay: 5s;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f5f5f5 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 300;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            font-size: 0.75rem;
            color: #666;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
            animation: pulse 2s infinite;
        }

        .status-dot.active {
            background: #2ecc71;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .date-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(212, 175, 55, 0.3);
            border-color: #d4af37;
            transform: scale(1.1);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .date-display {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            min-width: 300px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .today-indicator {
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c2 100%);
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .tab-btn {
            padding: 12px 30px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #a0a0a0;
            cursor: pointer;
            border-radius: 25px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c2 100%);
            color: #1a1a2e;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .content-wrapper {
            position: relative;
            min-height: 500px;
        }

        .content-card {
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }

        .content-card.active {
            display: block;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #d4af37, #f4e5c2, #d4af37);
        }

        .renungan-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .renungan-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            color: #d4af37;
            margin-bottom: 10px;
            font-style: italic;
        }

        .verse-ref {
            font-size: 0.9rem;
            color: #a0a0a0;
            letter-spacing: 2px;
        }

        .intro-box {
            background: rgba(212, 175, 55, 0.1);
            border-left: 4px solid #d4af37;
            padding: 20px;
            margin: 25px 0;
            border-radius: 0 10px 10px 0;
            font-style: italic;
            color: #e0e0e0;
            line-height: 1.8;
        }

        .renungan-content {
            line-height: 2;
            color: #d0d0d0;
            text-align: justify;
            font-size: 1.05rem;
        }

        .renungan-content p {
            margin-bottom: 20px;
            text-indent: 30px;
        }

        .highlight {
            color: #f4e5c2;
            font-weight: 500;
        }

        .quote-container {
            text-align: center;
            padding: 40px 20px;
        }

        .quote-icon {
            font-size: 4rem;
            color: #d4af37;
            opacity: 0.3;
            margin-bottom: 20px;
            font-family: serif;
            line-height: 1;
        }

        .quote-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.9rem;
            line-height: 1.6;
            color: #f5f5f5;
            margin-bottom: 30px;
            font-style: italic;
            position: relative;
            padding: 0 20px;
        }

        .quote-author {
            font-size: 0.9rem;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .quote-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 30px auto;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #d4af37;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
        }

        .retry-btn {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            background: #e74c3c;
            color: white;
        }

        .source-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .source-link a {
            color: #d4af37;
            text-decoration: none;
            font-size: 0.85rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .source-link a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .setup-notice {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            color: #e74c3c;
        }

        .setup-notice h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .setup-notice p {
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .card { padding: 25px; }
            .quote-text { font-size: 1.4rem; }
            .renungan-content { font-size: 1rem; }
            .tabs { flex-direction: column; align-items: center; }
            .tab-btn { width: 200px; }
            .date-display { min-width: 250px; font-size: 1.1rem; }
            .status-bar { flex-direction: column; gap: 10px; }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 4px;
        }

        .footer-note {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
            font-style: italic;
        }

        .update-info {
            text-align: center;
            font-size: 0.75rem;
            color: #555;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <header>
            <h1>Renungan & Quotes</h1>
            <div class="subtitle">Perjalanan Rohani Harian</div>
        </header>

        <div class="status-bar" id="statusBar" style="display: none;">
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Menghubungkan...</span>
            </div>
            <div class="status-indicator">
                <span>Sumber: Alkitab.mobi & Rehobot.org</span>
            </div>
        </div>

        <div class="date-nav">
            <button class="nav-btn" onclick="changeDate(-1)" id="prevBtn">‹</button>
            <div class="date-display">
                <span id="currentDate">Memuat...</span>
                <span id="todayBadge" class="today-indicator" style="display: none;">Hari Ini</span>
            </div>
            <button class="nav-btn" onclick="changeDate(1)" id="nextBtn">›</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('renungan')">Renungan Hari Ini</button>
            <button class="tab-btn" onclick="switchTab('quotes')">Quotes Hari Ini</button>
        </div>

        <div class="content-wrapper">
            <!-- Renungan Content -->
            <div id="renungan" class="content-card active">
                <div class="card" id="renunganCard">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Memuat konten...</p>
                    </div>
                </div>
            </div>

            <!-- Quotes Content -->
            <div id="quotes" class="content-card">
                <div class="card" id="quotesCard">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Memuat konten...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="update-info" id="updateInfo"></div>
        <div class="footer-note">
            <span id="footerText">Menghubungkan ke sumber data...</span>
        </div>
    </div>

    <script>
        /**
         * ============================================================================
         * KONFIGURASI SISTEM - EDIT BAGIAN INI
         * ============================================================================
         * 
         * CARA 1: Hardcode API Key (Untuk penggunaan pribadi)
         * Ganti nilai dibawah dengan API key Groq Anda yang diawali dengan "gsk_"
         */
        
        const CONFIG = {
            // GANTI INI DENGAN API KEY GROQ ANDA
            // Dapatkan di: https://console.groq.com
            GROQ_API_KEY: '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',
            
            // Model yang digunakan
            MODEL: 'llama-3.1-70b-versatile',
            
            // URL Sumber
            SOURCES: {
                renungan: 'https://alkitab.mobi/renungan/roc',
                quotes: 'https://rehobot.org/category/quote/'
            },
            
            // API Endpoint
            GROQ_API_URL: 'https://api.groq.com/openai/v1/chat/completions'
        };

        /**
         * CARA 2: LocalStorage (Lebih aman, tidak terlihat di kode)
         * Buka console browser (F12) dan ketik:
         * localStorage.setItem('renungan_api_key', 'gsk_your_api_key_here');
         * Lalu refresh halaman
         */

        // Inisialisasi API Key
        let API_KEY = CONFIG.GROQ_API_KEY;
        
        // Cek localStorage jika hardcode kosong
        if (!API_KEY) {
            API_KEY = localStorage.getItem('renungan_api_key') || '';
        }

        // State
        let currentViewDate = new Date();
        let today = new Date();
        let isLoading = false;

        // Format helpers
        const formatDateKey = (date) => date.toISOString().split('T')[0];
        const formatDateDisplay = (date) => date.toLocaleDateString('id-ID', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        });
        const isToday = (date) => date.toDateString() === today.toDateString();
        const isFuture = (date) => date > today;

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            if (!API_KEY) {
                showSetupNotice();
            } else {
                document.getElementById('statusBar').style.display = 'flex';
                initApp();
            }
        });

        function showSetupNotice() {
            document.getElementById('renunganCard').innerHTML = `
                <div class="setup-notice">
                    <h3>⚙️ Konfigurasi Diperlukan</h3>
                    <p>Sistem memerlukan API key untuk mengambil konten dari sumber.</p>
                    <p style="font-size: 0.8rem; margin-top: 20px; color: #888;">
                        Silakan hubungi administrator untuk mengaktifkan layanan ini.
                    </p>
                </div>
            `;
            document.getElementById('quotesCard').innerHTML = `
                <div class="setup-notice">
                    <p>Layanan tidak tersedia saat ini.</p>
                </div>
            `;
            document.getElementById('footerText').textContent = 'Sistem belum dikonfigurasi';
            document.getElementById('currentDate').textContent = formatDateDisplay(new Date());
        }

        function initApp() {
            updateStatus('loading', 'Menghubungkan...');
            loadContent();
            
            // Auto refresh setiap 6 jam
            setInterval(() => {
                if (isToday(currentViewDate)) loadContent();
            }, 6 * 60 * 60 * 1000);
        }

        function updateStatus(type, text) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            
            dot.className = 'status-dot ' + (type === 'active' ? 'active' : '');
            txt.textContent = text;
        }

        async function fetchWithGroq(type, date) {
            const url = CONFIG.SOURCES[type];
            const dateStr = formatDateDisplay(date);
            
            const prompt = type === 'renungan' 
                ? `Ambil konten renungan Oswald Chambers (ROC) untuk tanggal ${dateStr} dari website ${url}. Ekstrak: verse (ayat dasar), intro (paragraf pengantar), content (isi renungan lengkap dalam format HTML paragraph). Jika tanggal tidak tersedia, ambil renungan terbaru. Kembalikan dalam JSON format.`
                : `Ambil 3 quotes rohani terbaru dari website ${url}. Kembalikan dalam JSON format: { "quotes": ["quote1", "quote2", "quote3"] }`;

            const response = await fetch(CONFIG.GROQ_API_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: CONFIG.MODEL,
                    messages: [
                        {
                            role: 'system',
                            content: 'Anda adalah asisten yang mengambil konten dari website dan mengembalikannya dalam format JSON terstruktur.'
                        },
                        {
                            role: 'user',
                            content: prompt
                        }
                    ],
                    temperature: 0.1,
                    max_tokens: 4000
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'Request failed');
            }

            const data = await response.json();
            const content = data.choices[0].message.content;
            
            // Parse JSON dari response
            const jsonMatch = content.match(/\{[\s\S]*\}/);
            return jsonMatch ? JSON.parse(jsonMatch[0]) : JSON.parse(content);
        }

        async function loadContent() {
            if (isLoading) return;
            isLoading = true;

            const dateKey = formatDateKey(currentViewDate);
            
            // Update UI
            document.getElementById('currentDate').textContent = formatDateDisplay(currentViewDate);
            
            const badge = document.getElementById('todayBadge');
            badge.style.display = 'inline-block';
            badge.textContent = isToday(currentViewDate) ? 'Hari Ini' : 
                               isFuture(currentViewDate) ? 'Mendatang' : 'Arsip';
            
            document.getElementById('nextBtn').disabled = isFuture(currentViewDate);

            // Check cache (24 jam)
            const cachedRenungan = localStorage.getItem('renungan_' + dateKey);
            const cachedQuotes = localStorage.getItem('quotes_' + dateKey);
            const cacheTime = localStorage.getItem('cache_time_' + dateKey);
            const isCacheValid = cacheTime && (new Date() - new Date(cacheTime)) < (24 * 60 * 60 * 1000);

            if (cachedRenungan && cachedQuotes && isCacheValid) {
                displayRenungan(JSON.parse(cachedRenungan));
                displayQuotes(JSON.parse(cachedQuotes));
                updateStatus('active', 'Terhubung (cache)');
                document.getElementById('updateInfo').textContent = 'Terakhir diperbarui: ' + new Date(cacheTime).toLocaleString('id-ID');
                document.getElementById('footerText').textContent = 'Sumber: ROC & GSKI • Data dari cache';
                isLoading = false;
                return;
            }

            // Fetch from API
            updateStatus('loading', 'Mengambil data...');
            
            document.getElementById('renunganCard').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Mengambil renungan...</p>
                </div>
            `;
            
            document.getElementById('quotesCard').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Mengambil quotes...</p>
                </div>
            `;

            try {
                const [renunganData, quotesData] = await Promise.all([
                    fetchWithGroq('renungan', currentViewDate),
                    fetchWithGroq('quotes', currentViewDate)
                ]);

                if (renunganData) {
                    displayRenungan(renunganData);
                    localStorage.setItem('renungan_' + dateKey, JSON.stringify(renunganData));
                }
                
                if (quotesData) {
                    const quotes = quotesData.quotes || quotesData;
                    displayQuotes(quotes);
                    localStorage.setItem('quotes_' + dateKey, JSON.stringify(quotes));
                }

                localStorage.setItem('cache_time_' + dateKey, new Date().toISOString());
                updateStatus('active', 'Terhubung');
                document.getElementById('updateInfo').textContent = 'Diperbarui: ' + new Date().toLocaleString('id-ID');
                document.getElementById('footerText').textContent = 'Sumber: ROC & GSKI • Data real-time';

            } catch (error) {
                console.error('Error:', error);
                updateStatus('', 'Error koneksi');
                
                if (cachedRenungan) {
                    displayRenungan(JSON.parse(cachedRenungan));
                    document.getElementById('renunganCard').innerHTML += `
                        <div style="margin-top: 20px; padding: 15px; background: rgba(231, 76, 60, 0.1); border-radius: 10px; font-size: 0.85rem; color: #e74c3c; text-align: center;">
                            Mode offline - menggunakan data tersimpan
                        </div>
                    `;
                } else {
                    document.getElementById('renunganCard').innerHTML = `
                        <div class="error-message">
                            <p>Gagal mengambil data</p>
                            <button class="retry-btn" onclick="loadContent()">Coba Lagi</button>
                        </div>
                    `;
                }

                if (cachedQuotes) {
                    displayQuotes(JSON.parse(cachedQuotes));
                }
            }

            isLoading = false;
        }

        function displayRenungan(data) {
            document.getElementById('renunganCard').innerHTML = `
                <div class="renungan-header">
                    <div class="renungan-title">Renungan Oswald Chambers</div>
                    <div class="verse-ref">${data.verse || '-'}</div>
                </div>
                <div class="intro-box">${data.intro || 'Renungan hari ini'}</div>
                <div class="renungan-content">${data.content || '<p>Konten tidak tersedia</p>'}</div>
                <div class="source-link">
                    <a href="${CONFIG.SOURCES.renungan}" target="_blank">Buka di Alkitab.mobi →</a>
                </div>
            `;
        }

        function displayQuotes(quotes) {
            if (!Array.isArray(quotes)) quotes = [quotes];
            
            let html = `
                <div class="quote-container">
                    <div class="quote-icon">"</div>
                    <div class="quote-text">${quotes[0] || 'Quotes tidak tersedia'}</div>
                    <div class="quote-divider"></div>
                    <div class="quote-author">— Rehobot Church</div>
                </div>
            `;

            for (let i = 1; i < quotes.length && i < 3; i++) {
                html += `
                    <div style="margin-top: 20px; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1);">
                        <div class="quote-container" style="padding: 20px;">
                            <div class="quote-icon" style="font-size: 2rem; margin-bottom: 10px;">"</div>
                            <div class="quote-text" style="font-size: 1.3rem;">${quotes[i]}</div>
                        </div>
                    </div>
                `;
            }

            html += `
                <div class="source-link" style="margin-top: 30px;">
                    <a href="${CONFIG.SOURCES.quotes}" target="_blank">Lihat di Rehobot.org →</a>
                </div>
            `;

            document.getElementById('quotesCard').innerHTML = html;
        }

        function changeDate(direction) {
            const newDate = new Date(currentViewDate);
            newDate.setDate(newDate.getDate() + direction);
            
            if (isFuture(newDate) && direction > 0) return;
            
            currentViewDate = newDate;
            
            // Animation
            document.querySelectorAll('.card').forEach(card => {
                card.style.animation = 'none';
                setTimeout(() => card.style.animation = 'fadeInUp 0.6s ease-out', 10);
            });
            
            loadContent();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.content-card').forEach(card => card.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeDate(-1);
            if (e.key === 'ArrowRight') changeDate(1);
        });
    </script>
</body>
</html>
